<style>
/* Contact Form */

form {
    max-width: 600px;
    margin: 1rem auto;
}

label {
    display: block;
    margin-top: 1rem;
    margin-bottom: 0.35rem;
    font-weight: 600;
}

input,
textarea {
    display: block;
    width: 100%;
    box-sizing: border-box;

    padding: 0.6rem 0.8rem;

    border: 1px solid #ccc;
    border-radius: 4px;

    font: inherit;
}

textarea {
    min-height: 160px;
    resize: vertical;
}

button {
    margin-top: 1.25rem;

    padding: 0.7rem 1.4rem;

    border: 0.5px solid grey;
    border-radius: 4px;

    cursor: pointer;

    font: inherit;
	
    /* Added for spinner positioning */
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem; /* Space between text and spinner if both were visible */
}

button:hover {
    opacity: 0.9;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Spinner Styles */
.spinner {
    border: 3px solid rgba(0, 0, 0, 0.2); /* Adjusted: darker background for spinner track */
    border-top: 3px solid #4a4a4a; /* Adjusted: Dark grey for spinner foreground */
    border-radius: 50%;
    width: 1em; /* Adjust size relative to button font size */
    height: 1em;
    animation: spin 1s linear infinite;
    display: none; /* Hidden by default */
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }	
	
}
</style>

<form id="contactForm">

    <label for="name">Name:</label>
    <input id='name' name="name"  autocomplete="name" required>

    <label for="email">Email:</label>
    <input id='email' name="email" autocomplete="email" type="email" placeholder='you@example.com' required>

    <label for="message">For project inquiries, please drop your details below. If you prefer to jump on a quick WhatsApp chat or Slack call instead, just leave your number/handle in the message body and I'll initiate the thread:</label>
	<textarea
		id="message"
		name="message"
		maxlength="4000"
		placeholder=""
		required></textarea>

    <button type="submit" id="submitButton">
        <span id="buttonText">Submit</span>
        <span id="buttonSpinner" class="spinner"></span>	
	</button>
</form>

<script>
document.getElementById("contactForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = e.target;
    const submitButton = document.getElementById("submitButton");
    const buttonText = document.getElementById("buttonText");
    const buttonSpinner = document.getElementById("buttonSpinner");

    // Show spinner and disable button
    submitButton.disabled = true;
    buttonText.style.display = 'none';
    buttonSpinner.style.display = 'inline-block'; // Or 'flex' if you want it aligned differently
	
    const body = {
        name: form.name.value,
        email: form.email.value,
        message: form.message.value
    };

	try {
		const response = await fetch(
			"https://contact.prahladyeri14.workers.dev/",
			{
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				
				body: JSON.stringify(body)
			}
		);

		const result = await response.json();

		if (result.success) {
			alert("Message sent successfully.");
			form.reset();
		} else {
			alert(result.error);
		}
	} catch (error) {
        alert("An error occurred while sending your message. Please try again.");
        console.error("Fetch error:", error);
    } finally {
        // Hide spinner and re-enable button
        submitButton.disabled = false;
        buttonText.style.display = 'inline';
        buttonSpinner.style.display = 'none';
    }
});
</script>
